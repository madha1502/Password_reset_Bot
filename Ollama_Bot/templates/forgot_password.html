<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Ollama Recovery Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:460px;">
    <div class="steps-container">
      <div class="step-item"><div class="step-circle active">1</div><div class="step-label">Request OTP</div></div>
      <div class="step-line"></div>
      <div class="step-item"><div class="step-circle">2</div><div class="step-label">Verify OTP</div></div>
      <div class="step-line"></div>
      <div class="step-item"><div class="step-circle">3</div><div class="step-label">New Password</div></div>
    </div>
    <div class="auth-logo">📧</div>
    <div class="auth-title">Forgot Password</div>
    <div class="auth-subtitle">Enter your registered email to receive an OTP</div>
    <div id="error-msg"   class="alert-danger-dark  p-3 mb-3 d-none" style="font-size:.85rem;border-radius:8px;"></div>
    <div id="success-msg" class="alert-success-dark p-3 mb-3 d-none" style="font-size:.85rem;border-radius:8px;"></div>
    <form onsubmit="sendOTP(event)">
      <div class="mb-4">
        <label class="form-label-dark mb-2">Registered Email Address</label>
        <input type="email" id="email" class="form-control form-control-dark" placeholder="you@example.com" required>
      </div>
      <button type="submit" id="send-btn" class="btn btn-accent w-100">Send OTP</button>
    </form>
    <div class="text-center mt-3" style="font-size:.85rem;color:var(--text-muted);">
      Remember your password? <a href="/login" style="color:var(--accent);text-decoration:none;">Sign In</a>
    </div>
  </div>
</div>
<script>
async function sendOTP(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('send-btn');
  const err   = document.getElementById('error-msg');
  const suc   = document.getElementById('success-msg');
  err.classList.add('d-none'); suc.classList.add('d-none');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending…';
  try {
    const res  = await fetch('/reset/forgot-password', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email})
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Failed to send OTP.'; err.classList.remove('d-none'); }
    else {
      suc.textContent = 'OTP sent! Check your inbox. Redirecting…';
      suc.classList.remove('d-none');
      setTimeout(() => window.location.href = `/verify-otp?email=${encodeURIComponent(email)}`, 1500);
    }
  } catch { err.textContent = 'Connection error.'; err.classList.remove('d-none'); }
  finally { btn.disabled = false; btn.textContent = 'Send OTP'; }
}
</script>
</body>
</html>
