<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP — Ollama Recovery Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:460px;">
    <div class="steps-container">
      <div class="step-item"><div class="step-circle completed"><i class="bi bi-check"></i></div><div class="step-label">Request OTP</div></div>
      <div class="step-line completed"></div>
      <div class="step-item"><div class="step-circle active">2</div><div class="step-label">Verify OTP</div></div>
      <div class="step-line"></div>
      <div class="step-item"><div class="step-circle">3</div><div class="step-label">New Password</div></div>
    </div>
    <div class="auth-logo">🔢</div>
    <div class="auth-title">Enter OTP</div>
    <div class="auth-subtitle" id="email-hint">Enter the 6-digit code sent to your email</div>
    <div id="error-msg"   class="alert-danger-dark  p-3 mb-3 d-none" style="font-size:.85rem;border-radius:8px;"></div>
    <div id="success-msg" class="alert-success-dark p-3 mb-3 d-none" style="font-size:.85rem;border-radius:8px;"></div>

    <div class="otp-inputs mb-4">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" id="d1" oninput="mv(this,'d2')" onkeydown="bk(event,'d1')">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" id="d2" oninput="mv(this,'d3')" onkeydown="bk(event,'d1')">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" id="d3" oninput="mv(this,'d4')" onkeydown="bk(event,'d2')">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" id="d4" oninput="mv(this,'d5')" onkeydown="bk(event,'d3')">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" id="d5" oninput="mv(this,'d6')" onkeydown="bk(event,'d4')">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" id="d6" oninput="mv(this,null)" onkeydown="bk(event,'d5')">
    </div>

    <button id="verify-btn" class="btn btn-accent w-100" onclick="verifyOTP()">
      <i class="bi bi-shield-check me-2"></i>Verify OTP
    </button>
    <div class="text-center mt-3" style="font-size:.85rem;">
      Didn't receive the code? <a href="/forgot-password" style="color:var(--accent);text-decoration:none;">Resend OTP</a>
    </div>
  </div>
</div>
<script>
const email = new URLSearchParams(window.location.search).get('email') || '';
if (email) document.getElementById('email-hint').textContent = `Code sent to ${email}`;
document.getElementById('d1').focus();

function mv(el, nextId) { if (el.value && nextId) document.getElementById(nextId).focus(); }
function bk(e, prevId) { if (e.key === 'Backspace' && !e.target.value) document.getElementById(prevId)?.focus(); }

async function verifyOTP() {
  const otp = ['d1','d2','d3','d4','d5','d6'].map(id => document.getElementById(id).value).join('');
  const err = document.getElementById('error-msg');
  const suc = document.getElementById('success-msg');
  const btn = document.getElementById('verify-btn');
  err.classList.add('d-none'); suc.classList.add('d-none');
  if (otp.length !== 6) { err.textContent = 'Please enter all 6 digits.'; err.classList.remove('d-none'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verifying…';
  try {
    const res  = await fetch('/reset/verify-otp', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, otp})
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Verification failed.'; err.classList.remove('d-none'); }
    else { suc.textContent = 'OTP verified! Redirecting…'; suc.classList.remove('d-none'); setTimeout(() => window.location.href = `/reset-password?email=${encodeURIComponent(email)}`, 1000); }
  } catch { err.textContent = 'Connection error.'; err.classList.remove('d-none'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-shield-check me-2"></i>Verify OTP'; }
}
</script>
</body>
</html>
