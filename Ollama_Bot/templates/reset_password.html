<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Ollama Recovery Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:460px;">
    <div class="steps-container">
      <div class="step-item"><div class="step-circle completed"><i class="bi bi-check"></i></div><div class="step-label">Request OTP</div></div>
      <div class="step-line completed"></div>
      <div class="step-item"><div class="step-circle completed"><i class="bi bi-check"></i></div><div class="step-label">Verify OTP</div></div>
      <div class="step-line completed"></div>
      <div class="step-item"><div class="step-circle active">3</div><div class="step-label">New Password</div></div>
    </div>
    <div class="auth-logo">🔑</div>
    <div class="auth-title">Set New Password</div>
    <div class="auth-subtitle">Choose a strong password for your account</div>
    <div id="error-msg"   class="alert-danger-dark  p-3 mb-3 d-none" style="font-size:.85rem;border-radius:8px;"></div>
    <div id="success-msg" class="alert-success-dark p-3 mb-3 d-none" style="font-size:.85rem;border-radius:8px;"></div>
    <form onsubmit="resetPassword(event)">
      <div class="mb-3">
        <label class="form-label-dark mb-2">New Password</label>
        <input type="password" id="new-password" class="form-control form-control-dark" placeholder="Min. 6 characters" minlength="6" required>
      </div>
      <div class="mb-4">
        <label class="form-label-dark mb-2">Confirm Password</label>
        <input type="password" id="confirm-password" class="form-control form-control-dark" placeholder="Repeat your password" required>
      </div>
      <button type="submit" id="reset-btn" class="btn btn-accent w-100">
        <i class="bi bi-check-circle me-2"></i>Reset Password
      </button>
    </form>
  </div>
</div>
<script>
const email = new URLSearchParams(window.location.search).get('email') || '';
async function resetPassword(e) {
  e.preventDefault();
  const np  = document.getElementById('new-password').value;
  const cp  = document.getElementById('confirm-password').value;
  const err = document.getElementById('error-msg');
  const suc = document.getElementById('success-msg');
  const btn = document.getElementById('reset-btn');
  err.classList.add('d-none'); suc.classList.add('d-none');
  if (np !== cp) { err.textContent = 'Passwords do not match.'; err.classList.remove('d-none'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Resetting…';
  try {
    const res  = await fetch('/reset/reset-password', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, new_password: np})
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Reset failed.'; err.classList.remove('d-none'); }
    else { suc.textContent = 'Password reset successfully! Redirecting to login…'; suc.classList.remove('d-none'); setTimeout(() => window.location.href = '/login', 1500); }
  } catch { err.textContent = 'Connection error.'; err.classList.remove('d-none'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Reset Password'; }
}
</script>
</body>
</html>
