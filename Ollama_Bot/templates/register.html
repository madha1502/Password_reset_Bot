<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Ollama Recovery Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🔐</div>
    <div class="auth-title">Create Account</div>
    <div class="auth-subtitle">Join the Ollama Recovery Portal</div>

    <div id="error-msg"   class="alert-danger-dark  p-3 mb-3 d-none" style="font-size:.85rem;border-radius:8px;"></div>
    <div id="success-msg" class="alert-success-dark p-3 mb-3 d-none" style="font-size:.85rem;border-radius:8px;"></div>

    <form onsubmit="handleRegister(event)">
      <div class="mb-3">
        <label class="form-label-dark mb-2">Full Name</label>
        <input type="text" id="name" class="form-control form-control-dark" placeholder="John Doe" required>
      </div>
      <div class="mb-3">
        <label class="form-label-dark mb-2">Email Address</label>
        <input type="email" id="email" class="form-control form-control-dark" placeholder="you@example.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label-dark mb-2">Password</label>
        <input type="password" id="password" class="form-control form-control-dark" placeholder="Min. 6 characters" minlength="6" required>
      </div>
      <button type="submit" id="reg-btn" class="btn btn-accent w-100">Create Account</button>
    </form>

    <div class="text-center mt-3" style="font-size:.85rem;color:var(--text-muted);">
      Already have an account? <a href="/login" style="color:var(--accent);text-decoration:none;">Sign In</a>
    </div>
  </div>
</div>
<script>
async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const err = document.getElementById('error-msg');
  const suc = document.getElementById('success-msg');
  err.classList.add('d-none'); suc.classList.add('d-none');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const res  = await fetch('/auth/register', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name: document.getElementById('name').value, email: document.getElementById('email').value, password: document.getElementById('password').value})
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Registration failed.'; err.classList.remove('d-none'); }
    else { suc.textContent = 'Account created! Redirecting to login…'; suc.classList.remove('d-none'); setTimeout(() => window.location.href = '/login', 1200); }
  } catch { err.textContent = 'Connection error.'; err.classList.remove('d-none'); }
  finally { btn.disabled = false; btn.textContent = 'Create Account'; }
}
</script>
</body>
</html>
